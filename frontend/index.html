<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程评价系统 - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            transition: transform 0.3s ease;
        }

        .glass-panel:hover {
            transform: scale(1.02);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            transition: all 0.3s ease;
        }

        .btn-gradient:hover {
            background: linear-gradient(135deg, #5a6fd6 0%, #6a4190 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="glass-panel p-4 p-md-5 rounded-4">
                    <div class="text-center mb-4">
                        <h1 class="h3 fw-bold text-dark mb-2">欢迎回来</h1>
                        <p class="text-muted">请登录以访问您的仪表盘</p>
                    </div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="username" class="form-label small fw-medium">用户名</label>
                            <input type="text" class="form-control form-control-lg" id="username" name="username"
                                required placeholder="请输入用户名">
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label small fw-medium">密码</label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password"
                                required placeholder="请输入密码">
                        </div>

                        <div id="errorMessage" class="alert alert-danger py-2 d-none text-center small"></div>

                        <button type="submit" class="btn btn-gradient btn-lg w-100 text-white fw-bold py-2">
                            登录
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');

            try {
                const response = await fetch(`${API_BASE}/auth/login/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify({
                        id: data.id,
                        username: data.username,
                        email: data.email,
                        role: data.role
                    }));
                    window.location.href = 'dashboard.html';
                } else {
                    errorDiv.textContent = '用户名或密码错误';
                    errorDiv.classList.remove('d-none');
                }
            } catch (error) {
                errorDiv.textContent = '连接错误，请检查后台是否运行？';
                errorDiv.classList.remove('d-none');
            }
        });
    </script>
</body>

</html>
