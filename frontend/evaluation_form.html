<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>填写问卷 - 课程评价系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .question-card { border-radius: 12px; border: 1px solid #e9ecef; }
        .rating-label { cursor: pointer; transition: all 0.2s; }
        .rating-label:hover { transform: scale(1.1); }
        .rating-label input:checked + .rating-star { color: #ffc107; }
        .rating-star { font-size: 1.5rem; color: #dee2e6; transition: color 0.2s; }
        .choice-label { cursor: pointer; transition: all 0.2s; border-radius: 8px; }
        .choice-label:hover { background-color: #f8f9fa; }
        .choice-label input:checked + span { color: #6f42c1; font-weight: 500; }
        .btn-purple { background-color: #6f42c1; border-color: #6f42c1; color: #fff; }
        .btn-purple:hover { background-color: #5a32a3; border-color: #5a32a3; color: #fff; }
    </style>
</head>

<body class="py-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <a href="dashboard.html" class="btn btn-link text-muted p-0 mb-3">
                            <i class="bi bi-arrow-left me-1"></i> 返回仪表盘
                        </a>

                        <div id="loading" class="text-center text-muted py-5">
                            <div class="spinner-border text-primary mb-3" role="status"></div>
                            <p>加载问卷中...</p>
                        </div>

                        <div id="survey-content" class="d-none">
                            <h1 id="survey-title" class="h3 fw-bold text-dark mb-2"></h1>
                            <p id="survey-desc" class="text-muted mb-4"></p>

                            <form id="survey-form">
                                <div id="questions-list"></div>
                                <div class="pt-4 border-top mt-4">
                                    <button type="submit" class="btn btn-purple btn-lg w-100">
                                        <i class="bi bi-send me-2"></i> 提交反馈
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal fade" id="success-modal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-4">
                <div class="mb-3">
                    <div class="bg-success bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 80px; height: 80px;">
                        <i class="bi bi-check-lg text-success" style="font-size: 2.5rem;"></i>
                    </div>
                </div>
                <h4 class="fw-bold text-dark mb-2">提交成功！</h4>
                <p class="text-muted mb-4">感谢您的反馈，您的评价已记录。</p>
                <button onclick="window.location.href='dashboard.html'" class="btn btn-purple btn-lg w-100">
                    返回仪表盘
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const qId = urlParams.get('id');

        if (!qId) {
            window.location.href = 'dashboard.html';
        }

        function showToast(message, type = 'success') {
            const bgClass = type === 'success' ? 'bg-success' : 'bg-danger';
            const toastHtml = `
                <div class="toast align-items-center text-white ${bgClass} border-0" role="alert">
                    <div class="d-flex">
                        <div class="toast-body">${message}</div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                    </div>
                </div>
            `;
            const container = document.querySelector('.toast-container');
            container.insertAdjacentHTML('beforeend', toastHtml);
            const toastEl = container.lastElementChild;
            const toast = new bootstrap.Toast(toastEl, { delay: 3000 });
            toast.show();
            toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
        }

        async function loadSurvey() {
            try {
                const q = await apiFetch(`/evaluations/questionnaires/${qId}/`);

                document.getElementById('loading').classList.add('d-none');
                document.getElementById('survey-content').classList.remove('d-none');
                document.getElementById('survey-title').textContent = q.title;
                document.getElementById('survey-desc').textContent = q.description;

                const container = document.getElementById('questions-list');
                container.innerHTML = q.questions.map((question, idx) => {
                    let inputHtml = '';
                    const fieldName = `q_${question.id}`;

                    if (question.question_type === 'text') {
                        inputHtml = `<textarea name="${fieldName}" class="form-control" rows="3" placeholder="请输入您的回答..." required></textarea>`;
                    } else if (question.question_type === 'rating') {
                        inputHtml = `
                            <div class="d-flex gap-3">
                                ${[1, 2, 3, 4, 5].map(v => `
                                    <label class="rating-label text-center">
                                        <input type="radio" name="${fieldName}" value="${v}" required class="d-none">
                                        <i class="bi bi-star-fill rating-star"></i>
                                        <div class="small text-muted">${v}星</div>
                                    </label>
                                `).join('')}
                            </div>
                        `;
                    } else if (question.question_type === 'choice') {
                        const choices = question.choices.split(',').map(c => c.trim());
                        inputHtml = `
                            <div class="d-flex flex-column gap-2">
                                ${choices.map(c => `
                                    <label class="choice-label d-flex align-items-center p-3 border rounded">
                                        <input type="radio" name="${fieldName}" value="${c}" required class="form-check-input me-3">
                                        <span>${c}</span>
                                    </label>
                                `).join('')}
                            </div>
                        `;
                    }

                    return `
                        <div class="question-card bg-light p-4 mb-3" data-qid="${question.id}">
                            <label class="form-label fw-bold text-dark mb-3">${idx + 1}. ${question.text}</label>
                            ${inputHtml}
                        </div>
                    `;
                }).join('');

            } catch (e) {
                document.getElementById('loading').innerHTML = `
                    <i class="bi bi-exclamation-circle text-danger" style="font-size: 3rem;"></i>
                    <p class="mt-3">加载问卷失败</p>
                `;
            }
        }

        document.getElementById('survey-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);
            const answers = [];

            const questionDivs = document.querySelectorAll('[data-qid]');
            questionDivs.forEach(div => {
                const questionId = div.dataset.qid;
                const value = formData.get(`q_${questionId}`);
                if (value) {
                    answers.push({ question: questionId, value: value });
                }
            });

            try {
                await apiFetch('/evaluations/responses/', {
                    method: 'POST',
                    body: JSON.stringify({ questionnaire: qId, answers: answers })
                });
                const modal = new bootstrap.Modal(document.getElementById('success-modal'));
                modal.show();
            } catch (e) {
                showToast("提交失败，请重试", "error");
            }
        });

        loadSurvey();
    </script>
</body>

</html>
