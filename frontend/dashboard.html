<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - 课程评价系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .sidebar { width: 260px; min-height: 100vh; background: linear-gradient(180deg, #212529 0%, #343a40 100%); }
        .sidebar-link { color: rgba(255,255,255,0.7); transition: all 0.2s; border-radius: 8px; }
        .sidebar-link:hover { color: #fff; background-color: rgba(255,255,255,0.1); transform: translateX(5px); }
        .sidebar-link.active { color: #fff; background-color: rgba(255,255,255,0.15); }
        .stat-card { border-radius: 12px; border: none; box-shadow: 0 2px 12px rgba(0,0,0,0.08); transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .status-published { background-color: #d1e7dd; color: #0f5132; }
        .status-draft { background-color: #e2e3e5; color: #41464b; }
        .status-closed { background-color: #f8d7da; color: #842029; }
        .brand-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .btn-purple { background-color: #6f42c1; border-color: #6f42c1; color: #fff; }
        .btn-purple:hover { background-color: #5a32a3; border-color: #5a32a3; color: #fff; }
        .btn-pink { background-color: #d63384; border-color: #d63384; color: #fff; }
        .btn-pink:hover { background-color: #b02a6f; border-color: #b02a6f; color: #fff; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>

<body>
    <div class="d-flex" style="min-height: 100vh;">
        <!-- Sidebar -->
        <div class="sidebar d-flex flex-column text-white flex-shrink-0">
            <div class="p-4">
                <h1 class="h4 fw-bold brand-gradient">EvalSys</h1>
                <p class="small text-secondary mb-0">课程评价系统</p>
            </div>

            <nav class="flex-grow-1 px-3">
                <a href="#" onclick="showSection('dashboard')" class="sidebar-link d-flex align-items-center px-3 py-2 mb-2 text-decoration-none active">
                    <i class="bi bi-speedometer2 me-3"></i> 仪表盘
                </a>
                <a href="#" onclick="showSection('courses')" class="sidebar-link d-flex align-items-center px-3 py-2 mb-2 text-decoration-none">
                    <i class="bi bi-book me-3"></i> 课程管理
                </a>
                <a href="#" onclick="showSection('evaluations')" class="sidebar-link d-flex align-items-center px-3 py-2 mb-2 text-decoration-none">
                    <i class="bi bi-clipboard-check me-3"></i> 问卷评价
                </a>
                <a href="#" onclick="showSection('analysis')" id="nav-analysis" class="sidebar-link d-flex align-items-center px-3 py-2 mb-2 text-decoration-none d-none">
                    <i class="bi bi-graph-up me-3"></i> 数据分析
                </a>
                <a href="#" onclick="showSection('users')" id="nav-users" class="sidebar-link d-flex align-items-center px-3 py-2 mb-2 text-decoration-none d-none">
                    <i class="bi bi-people me-3"></i> 用户管理
                </a>
            </nav>

            <div class="p-3 border-top border-secondary">
                <div class="d-flex align-items-center mb-3">
                    <div class="avatar bg-purple text-white" id="userAvatar" style="background-color: #6f42c1;">U</div>
                    <div class="ms-3">
                        <p class="mb-0 small fw-medium" id="userName">User</p>
                        <p class="mb-0 small text-secondary text-uppercase" id="userRole">Role</p>
                    </div>
                </div>
                <button onclick="logout()" class="btn btn-danger btn-sm w-100">
                    <i class="bi bi-box-arrow-right me-1"></i> 退出登录
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1 p-4" style="min-width: 0; max-height: 100vh; overflow-y: auto;">
            <!-- Dashboard Section -->
            <div id="section-dashboard">
                <h2 class="h3 fw-bold text-dark mb-4">概览</h2>
                <div class="row g-4 mb-4">
                    <div class="col-md-6 col-lg-3">
                        <div class="card stat-card border-start border-4 border-primary">
                            <div class="card-body">
                                <h6 class="text-muted small fw-medium">课程数量</h6>
                                <p class="h2 fw-bold text-dark mb-0" id="stats-courses">-</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <div class="card stat-card border-start border-4 border-danger">
                            <div class="card-body">
                                <h6 class="text-muted small fw-medium">问卷数量</h6>
                                <p class="h2 fw-bold text-dark mb-0" id="stats-questionnaires">-</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <div class="card stat-card border-start border-4 border-info">
                            <div class="card-body">
                                <h6 class="text-muted small fw-medium">反馈数量</h6>
                                <p class="h2 fw-bold text-dark mb-0" id="stats-responses">-</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 col-lg-3" id="stats-users-card">
                        <div class="card stat-card border-start border-4 border-success">
                            <div class="card-body">
                                <h6 class="text-muted small fw-medium">用户数量</h6>
                                <p class="h2 fw-bold text-dark mb-0" id="stats-users">-</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Courses Section -->
            <div id="section-courses" class="d-none">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="h3 fw-bold text-dark mb-0">课程管理</h2>
                    <div class="btn-group" id="course-actions">
                        <button onclick="exportCourses()" class="btn btn-secondary btn-sm">
                            <i class="bi bi-download me-1"></i> 导出CSV
                        </button>
                        <label class="btn btn-primary btn-sm mb-0">
                            <i class="bi bi-upload me-1"></i> 导入CSV
                            <input type="file" accept=".csv" onchange="importCourses(this)" class="d-none">
                        </label>
                        <button onclick="openCourseModal()" class="btn btn-purple btn-sm">
                            <i class="bi bi-plus-lg me-1"></i> 添加课程
                        </button>
                    </div>
                </div>
                <div id="courses-list" class="row g-4"></div>
            </div>

            <!-- Evaluations Section -->
            <div id="section-evaluations" class="d-none">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="h3 fw-bold text-dark mb-0">问卷评价</h2>
                    <button onclick="openQuestionnaireModal()" id="btn-create-eval" class="btn btn-pink btn-sm d-none">
                        <i class="bi bi-plus-lg me-1"></i> 创建问卷
                    </button>
                </div>
                <div id="evaluations-list"></div>
            </div>

            <!-- Analysis Section -->
            <div id="section-analysis" class="d-none">
                <h2 class="h3 fw-bold text-dark mb-4">数据分析</h2>
                <div class="mb-4">
                    <label class="form-label small fw-medium">选择问卷</label>
                    <select id="analysis-questionnaire-select" class="form-select" style="max-width: 400px;" onchange="loadQuestionnaireStats(this.value)">
                        <option value="">请选择问卷...</option>
                    </select>
                </div>
                <div id="analysis-content" class="row g-4"></div>
            </div>

            <!-- Users Section (Admin Only) -->
            <div id="section-users" class="d-none">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="h3 fw-bold text-dark mb-0">用户管理</h2>
                    <button onclick="openUserModal()" class="btn btn-purple btn-sm">
                        <i class="bi bi-plus-lg me-1"></i> 添加用户
                    </button>
                </div>
                <div class="btn-group mb-3">
                    <button onclick="filterUsers('')" class="btn btn-outline-secondary btn-sm">全部</button>
                    <button onclick="filterUsers('admin')" class="btn btn-outline-danger btn-sm">管理员</button>
                    <button onclick="filterUsers('teacher')" class="btn btn-outline-primary btn-sm">教师</button>
                    <button onclick="filterUsers('student')" class="btn btn-outline-success btn-sm">学生</button>
                </div>
                <div class="card">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="small text-uppercase text-muted">用户名</th>
                                    <th class="small text-uppercase text-muted">邮箱</th>
                                    <th class="small text-uppercase text-muted">角色</th>
                                    <th class="small text-uppercase text-muted">操作</th>
                                </tr>
                            </thead>
                            <tbody id="users-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Course Modal -->
    <div class="modal fade" id="course-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="course-modal-title">添加课程</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="course-id">
                    <div class="mb-3">
                        <label class="form-label small fw-medium">课程代码</label>
                        <input type="text" id="course-code" class="form-control" placeholder="如: CS102">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-medium">课程名称</label>
                        <input type="text" id="course-name" class="form-control" placeholder="课程名称">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-medium">课程描述</label>
                        <textarea id="course-desc" class="form-control" placeholder="课程描述" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-medium">学分</label>
                        <input type="number" id="course-credits" class="form-control" placeholder="学分" min="1" max="10" value="3">
                    </div>
                    <div class="mb-3" id="course-teacher-group">
                        <label class="form-label small fw-medium">授课教师</label>
                        <select id="course-teacher" class="form-select">
                            <option value="">请选择教师...</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" onclick="saveCourse()" class="btn btn-purple">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Questionnaire Modal -->
    <div class="modal fade" id="questionnaire-modal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">创建问卷</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <input type="text" id="q-title" class="form-control" placeholder="问卷标题">
                    </div>
                    <div class="mb-3">
                        <textarea id="q-desc" class="form-control" placeholder="问卷描述" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <select id="q-course" class="form-select"></select>
                    </div>
                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="fw-medium">问题列表</span>
                            <button type="button" onclick="openQuestionModal()" class="btn btn-link btn-sm text-purple p-0">
                                <i class="bi bi-plus-lg"></i> 添加问题
                            </button>
                        </div>
                        <div id="questions-container"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" onclick="saveQuestionnaire()" class="btn btn-purple">保存并发布</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Question Modal -->
    <div class="modal fade" id="question-modal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">添加问题</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label small fw-medium">问题类型</label>
                        <select id="new-q-type" class="form-select" onchange="toggleChoicesInput()">
                            <option value="rating">评分 (1-5星)</option>
                            <option value="text">文本回答</option>
                            <option value="choice">单选题</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-medium">问题内容</label>
                        <input type="text" id="new-q-text" class="form-control" placeholder="请输入问题">
                    </div>
                    <div id="choices-input" class="mb-3 d-none">
                        <label class="form-label small fw-medium">选项 (用逗号分隔)</label>
                        <input type="text" id="new-q-choices" class="form-control" placeholder="选项A,选项B,选项C">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" onclick="addQuestion()" class="btn btn-purple">添加</button>
                </div>
            </div>
        </div>
    </div>

    <!-- User Modal -->
    <div class="modal fade" id="user-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="user-modal-title">添加用户</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="user-id">
                    <div class="mb-3">
                        <input type="text" id="user-username" class="form-control" placeholder="用户名">
                    </div>
                    <div class="mb-3">
                        <input type="email" id="user-email" class="form-control" placeholder="邮箱">
                    </div>
                    <div class="mb-3">
                        <input type="password" id="user-password" class="form-control" placeholder="密码 (留空则使用默认密码)">
                    </div>
                    <div class="mb-3">
                        <select id="user-role" class="form-select">
                            <option value="student">学生</option>
                            <option value="teacher">教师</option>
                            <option value="admin">管理员</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" onclick="saveUser()" class="btn btn-purple">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Statistics Modal -->
    <div class="modal fade" id="stats-modal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="stats-modal-title">问卷统计</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="stats-modal-content"></div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container"></div>

    <!-- Confirm Delete Modal -->
    <div class="modal fade" id="confirm-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="confirm-modal-title">确认删除</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted mb-0" id="confirm-modal-message">确定要删除吗？此操作不可撤销。</p>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger btn-sm" id="confirm-modal-btn">删除</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/dashboard.js"></script>
</body>

</html>
